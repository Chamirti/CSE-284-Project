[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gwas-tool"
version = "0.1.0"
description = "Command-line GWAS tool with PCA correction, ancestry-stratification, and Manhattan/QQ plots (sample dataset used for peer review)"."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "numpy>=1.23",
  "pandas>=2.0",
  "scipy>=1.10",
  "scikit-learn>=1.2",
  "matplotlib>=3.7"
]

[project.scripts]
gwas-tool = "gwas_tool.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
