[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gwas-pipeline"
version = "0.1.0"
description = "GWAS pipeline for chromosome 22 data"
authors = [
    {name = "Your Name"}
]
dependencies = [
    "numpy",
    "pandas",
    "scikit-learn",
    "statsmodels",
    "matplotlib"
]

[project.scripts]
gwas-pipeline = "gwas_tool.cli:main"
